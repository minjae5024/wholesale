<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마켓 프라이스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; }
        body { display: flex; flex-direction: column; }
        main { flex-grow: 1; overflow: hidden; }
        #market-list-container::-webkit-scrollbar { width: 6px; }
        #market-list-container::-webkit-scrollbar-thumb { background-color: #a0aec0; border-radius: 3px; }
        #post-content { white-space: pre-wrap; }
    </style>
</head>
<body>

<header id="main-header" class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-green-600 flex items-center"><span>마켓 프라이스</span></a>
        <nav class="hidden md:flex flex-grow justify-center items-center space-x-8">
            <a href="/" class="text-gray-500 hover:text-green-600 transition duration-300">도매가격</a>
            <a href="/community" class="text-gray-800 hover:text-green-600 transition duration-300 font-semibold border-b-2 border-green-500 pb-1">커뮤니티</a>
        </nav>
        <div id="auth-buttons" class="hidden items-center space-x-2">
            <a href="/login" class="text-gray-600 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">로그인</a>
            <a href="/register" class="bg-green-500 text-white font-semibold px-4 py-2 rounded-md text-sm hover:bg-green-600">회원가입</a>
        </div>
        <div id="user-info" class="hidden items-center space-x-4">
            <span id="username-display" class="font-semibold text-gray-700"></span>
            <button id="logout-button" class="text-gray-600 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">로그아웃</button>
        </div>
    </div>
</header>

<main class="container mx-auto p-4 sm:p-6 lg:p-8 flex-grow flex gap-6">
    <aside class="w-1/4 lg:w-1/5 bg-white rounded-lg shadow-sm p-4 flex flex-col">
        <h2 class="text-lg font-bold mb-4 border-b pb-2 text-center">게시판 목록</h2>
        <div id="market-list-container" class="flex-grow overflow-y-auto pr-2 space-y-1">
            <div>
                <a href="/community" id="all-posts-link" class="block p-2 rounded text-sm font-semibold text-gray-700 hover:bg-green-50">
                    <i class="fas fa-globe-asia mr-2"></i>전체 게시판
                </a>
            </div>
            <div class="border-t my-2"></div>
        </div>
    </aside>

    <section class="w-3/4 lg:w-4/5 bg-white rounded-lg shadow-sm p-6 flex flex-col relative">
        <div id="post-container" class="bg-white rounded-lg">
            <div class="text-center p-12">
                <p>게시글을 불러오는 중입니다...</p>
            </div>
        </div>
    </section>
</main>

<script>
    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) {
            return '';
        }
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.toString().replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    document.addEventListener("DOMContentLoaded", function() {
        const token = localStorage.getItem('jwt-token');
        const authButtons = document.getElementById('auth-buttons');
        const userInfo = document.getElementById('user-info');

        if (token) {
            const payload = parseJwt(token);
            if (payload) document.getElementById('username-display').textContent = `${payload.sub}님`;
            authButtons.classList.add('hidden');
            authButtons.classList.remove('md:flex');
            userInfo.classList.remove('hidden');
            userInfo.classList.add('md:flex');
        } else {
            authButtons.classList.remove('hidden');
            authButtons.classList.add('md:flex');
            userInfo.classList.add('hidden');
            userInfo.classList.remove('md:flex');
        }

        document.getElementById('logout-button')?.addEventListener('click', () => {
            localStorage.removeItem('jwt-token');
            alert('로그아웃 되었습니다.');
            window.location.href = '/';
        });

        const postContainer = document.getElementById('post-container');
        const segments = window.location.pathname.split('/').filter(Boolean);
        const postId = (segments.length >= 2 && segments[segments.length - 2] === 'posts') ? segments[segments.length - 1] : null;

        if (!postId) {
            postContainer.innerHTML = '<p class="text-center text-red-500">잘못된 접근입니다.</p>';
            return;
        }

        async function fetchPostDetail() {
            const headers = token ? { 'Authorization': token } : {};
            try {
                const response = await fetch(`/api/posts/${postId}`, { headers });
                if (!response.ok) throw new Error('게시글을 찾을 수 없거나 볼 권한이 없습니다.');

                const post = await response.json();

                postContainer.innerHTML = `
                    <div class="border-b pb-4 mb-4">
                        <h1 class="text-3xl font-bold text-gray-900 break-words">${escapeHtml(post.title)}</h1>
                        <div class="flex items-center text-sm text-gray-500 mt-2">
                            <span>작성자: ${escapeHtml(post.author)}</span>
                            <span class="mx-2">|</span>
                            <span>작성일: ${escapeHtml(post.createdAt)}</span>
                            <span class="mx-2">|</span>
                            <span>조회수: ${post.viewCount}</span>
                        </div>
                    </div>
                    <div id="post-content" class="prose max-w-none text-gray-800 leading-relaxed min-h-[200px]">${escapeHtml(post.content)}</div>
                    <div class="mt-8 pt-4 border-t flex justify-between items-center">
                        <a href="/community" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">목록으로</a>
                        <div id="delete-button-container"></div>
                    </div>
                `;

                if (post.owner) {
                    const deleteButtonContainer = document.getElementById('delete-button-container');
                    const deleteButton = document.createElement('button');
                    deleteButton.id = 'delete-btn';
                    deleteButton.className = 'px-4 py-2 bg-red-500 text-white font-semibold rounded-lg hover:bg-red-600 transition-colors';
                    deleteButton.textContent = '삭제';
                    deleteButton.addEventListener('click', () => deletePost(postId));
                    deleteButtonContainer.appendChild(deleteButton);
                }

            } catch (error) {
                postContainer.innerHTML = `<p class="text-center text-red-500">${error.message}</p>`;
            }
        }

        async function deletePost(id) {
            if (!confirm('정말로 이 게시글을 삭제하시겠습니까?')) return;
            if (!token) {
                alert('로그인이 필요합니다.');
                return;
            }
            try {
                const response = await fetch(`/api/posts/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token }
                });
                if (response.ok) {
                    alert('게시글이 삭제되었습니다.');
                    window.location.href = '/community';
                } else {
                    const errorMsg = await response.text();
                    alert(`삭제 실패: ${errorMsg}`);
                }
            } catch (error) {
                console.error('삭제 요청 실패:', error);
                alert('삭제 중 오류가 발생했습니다.');
            }
        }

        const marketListContainer = document.getElementById('market-list-container');

        async function fetchMarkets() {
            try {
                const response = await fetch('/api/markets');
                const markets = await response.json();
                markets.forEach(market => {
                    const link = document.createElement('a');
                    link.href = `/community?marketId=${market.id}`;
                    link.className = 'block p-2 rounded text-sm text-gray-700 hover:bg-green-50 market-link';
                    link.textContent = market.name;
                    marketListContainer.appendChild(link);
                });
            } catch (error) { console.error("시장 목록 로딩 실패:", error); }
        }

        marketListContainer.addEventListener('click', e => {
            const link = e.target.closest('a');
            if (link) {
                e.preventDefault();
                window.location.href = link.href;
            }
        });

        fetchPostDetail();
        fetchMarkets();
    });
</script>
</body>
</html>
